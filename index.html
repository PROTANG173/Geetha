<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Track - กรีฑาสีเหลือง</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f4f4f5;
            color: #111827;
        }
        /* ซ่อน Scrollbar ทั่วไปแต่ยัง Scroll ได้ */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-20 selection:bg-yellow-300">

    <!-- Header -->
    <header class="fixed top-0 left-0 w-full z-40 bg-yellow-400 border-b-4 border-black shadow-[0px_4px_0px_0px_rgba(0,0,0,1)]">
        <div class="flex justify-between items-center p-4 max-w-md mx-auto">
            <button onclick="toggleMenu()" class="p-2 border-2 border-black bg-white hover:bg-yellow-200 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-transform active:scale-95">
                <i data-lucide="menu" class="w-6 h-6 text-black"></i>
            </button>
            <h1 class="text-2xl font-black tracking-wider uppercase text-black" style="font-family: 'Courier New', Courier, monospace; text-shadow: 2px 2px 0px #FFF;">
                YELLOW TRACK
            </h1>
            <div class="w-10"></div> <!-- Spacer -->
        </div>
    </header>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-50 opacity-0 pointer-events-none transition-opacity duration-300" onclick="toggleMenu()">
        <!-- Sidebar Content -->
        <div id="sidebar-content" class="absolute top-0 left-0 w-3/4 max-w-sm h-full bg-yellow-400 border-r-4 border-black transform -translate-x-full transition-transform duration-300 ease-in-out" onclick="event.stopPropagation()">
            <div class="p-4 border-b-4 border-black flex justify-between items-center bg-white">
                <h2 class="font-black text-xl">เมนูหลัก</h2>
                <button onclick="toggleMenu()" class="p-1 hover:bg-gray-200 rounded border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                    <i data-lucide="x" class="w-5 h-5 text-black"></i>
                </button>
            </div>
            <nav class="p-4 flex flex-col gap-4 mt-4" id="nav-menu">
                <!-- Navigation Buttons will be injected here -->
            </nav>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="max-w-md mx-auto pt-24 px-4" id="main-content">
        <!-- Loading State -->
        <div class="flex flex-col items-center justify-center h-[50vh]">
            <i data-lucide="loader" class="w-10 h-10 animate-spin mb-4 text-yellow-500"></i>
            <p class="font-bold text-lg animate-pulse">กำลังซิงค์ข้อมูล...</p>
        </div>
    </main>

    <script>
        // --- ข้อมูลแกนนำ (Admin) ---
        const leaders = [
            { id: 1, name: 'พี่โอโซน', fullname: 'นายรชต พึ่งธรรม', grade: 'ม.6/3', role: 'Admin', contact: 'IG: _ozxn3q', img: 'https://i.postimg.cc/yxKcndc5/Gemini-Generated-Image-rzvbrsrzvbrsrzvb.png' },
            { id: 2, name: 'พี่สตางค์', fullname: 'นายธนวิชญ์ กองนิล', grade: 'ม.6/3', role: 'Admin', contact: 'IG: protangsawaddee', img: 'https://i.postimg.cc/8CQC7FDH/24863.jpg' },
            { id: 3, name: 'พี่อ่าวไทย', fullname: 'นายอัครพล บุญเรืองนาม', grade: 'ม.6/3', role: 'Admin', contact: 'IG: _xwthxi22', img: 'https://i.postimg.cc/Vs9jvqP3/Gemini-Generated-Image-yrnh6uyrnh6uyrnh.png' },
            { id: 4, name: 'พี่ก้านพูล', fullname: 'นายพัฒธิวัฒน์ สุขนวล', grade: 'ม.6/7', role: 'Admin', contact: 'IG: pxtiwqtp_.16', img: 'https://i.postimg.cc/wMLz82yn/24864.jpg' },
            { id: 5, name: 'พี่ซีซ่า', fullname: 'นายปุญญพัฒน์ นำหน้า', grade: 'ม.6/3', role: 'Support', contact: 'IG: zzapunyaphat', img: 'https://i.postimg.cc/4xBggmy7/24866.jpg' }
        ];

        let members = [];
        let eventData = { 'ม.ต้น': {}, 'ม.ปลาย': {} }; // แยกกลุ่ม ม.ต้น ม.ปลาย
        
        // URL 1: ฟอร์มลงทะเบียนหลัก
        const SHEET_CSV_URL_1 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRD62YfgQ97itiaoCuHGwY-JwtkRP3U6FQXCiPGxHxEfpmQ1XAaFs12bAOEmsONsoKW88f150m7TyeO/pub?output=csv&gid=170326434";
        // URL 2: ฟอร์มบันทึกระยะทาง (Log)
        const SHEET_CSV_URL_2 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRL84Ewdp36UzuqhNXKJiF8HoDYXP0RZ9IYFx4RCx6AyIAmHbqkZwTgz5HTqO1Pkq7GrL8Q319yyuu7/pub?output=csv";

        const navItems = [
            { id: 'home', label: 'หน้าแรก', icon: 'users' },
            { id: 'dashboard', label: 'แดชบอร์ด', icon: 'activity' },
            { id: 'leaderboard', label: 'ตารางอันดับ', icon: 'trophy' },
            { id: 'events', label: 'รายการแข่งขัน', icon: 'calendar' },
            { id: 'profile', label: 'โปรไฟล์', icon: 'user-circle' },
        ];

        // --- STATE ---
        let activeTab = 'home';
        let isMenuOpen = false;
        let selectedEvent = '';
        let currentUser = null; 
        let currentLevel = 'ม.ต้น'; // State สำหรับสลับ ม.ต้น / ม.ปลาย

        function convertDriveLink(url) {
            if (!url) return 'https://api.dicebear.com/7.x/pixel-art/svg?seed=Yellow';
            const match = url.match(/id=([^&]+)/) || url.match(/\/d\/([^/]+)/);
            if (match && match[1]) {
                return `https://lh3.googleusercontent.com/d/${match[1]}`;
            }
            return url;
        }

        async function loadAthletesData() {
            try {
                // 1. โหลดข้อมูลลงทะเบียน
                const res1 = await fetch(SHEET_CSV_URL_1);
                const data1 = await res1.text();
                const lines1 = data1.split('\n');
                
                let membersMap = {};

                for (let i = 1; i < lines1.length; i++) {
                    const line = lines1[i].trim();
                    if (!line) continue;
                    
                    const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/^"|"$/g, '').trim());
                    
                    if (row.length >= 7) {
                        const studentId = row[3];
                        const gender = row[4] ? row[4].trim() : "";
                        const evtName = (row[6] || "-") + (gender ? ` (${gender})` : "");
                        
                        const gradeStr = row[5];
                        const cleanGrade = gradeStr.replace(/^ม\./, '').trim(); 
                        const loginId = `${studentId}_${cleanGrade}`;
                        const password = studentId;

                        // คำนวณว่าเป็น ม.ต้น หรือ ม.ปลาย
                        const isJunior = cleanGrade.startsWith('1') || cleanGrade.startsWith('2') || cleanGrade.startsWith('3');
                        const level = isJunior ? 'ม.ต้น' : 'ม.ปลาย';

                        membersMap[studentId] = {
                            id: studentId,
                            loginId: loginId,
                            password: password,
                            fullname: row[1],
                            name: row[2] || row[1].split(' ')[0], 
                            grade: gradeStr.includes("ม.") ? gradeStr : "ม." + gradeStr,
                            level: level, // เก็บระดับชั้น
                            event: evtName,
                            img: convertDriveLink(row[7]),
                            distance: 0,
                            practiceCount: 0,
                            history: [],
                            runs: [] // เก็บประวัติแบบละเอียด { date, distance, img }
                        };
                    }
                }

                // 2. โหลดข้อมูลระยะทาง
                const res2 = await fetch(SHEET_CSV_URL_2);
                const data2 = await res2.text();
                const lines2 = data2.split('\n');

                for (let i = 1; i < lines2.length; i++) {
                    const line = lines2[i].trim();
                    if (!line) continue;
                    
                    const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/^"|"$/g, '').trim());
                    
                    if (row.length >= 4) {
                        const studentId = row[1];
                        const dateStr = row[2];
                        const distVal = parseFloat(row[3]) || 0;
                        const runImg = convertDriveLink(row[4]);

                        if (membersMap[studentId]) {
                            membersMap[studentId].distance += distVal;
                            membersMap[studentId].history.push(distVal);
                            membersMap[studentId].practiceCount += 1;
                            
                            membersMap[studentId].runs.unshift({
                                date: dateStr,
                                distance: distVal,
                                img: runImg
                            });
                        }
                    }
                }

                members = Object.values(membersMap);
                
                // จัดกลุ่มตาม ม.ต้น / ม.ปลาย และ รายการแข่งขัน
                eventData = { 'ม.ต้น': {}, 'ม.ปลาย': {} };
                members.forEach(member => {
                    if (!eventData[member.level][member.event]) {
                        eventData[member.level][member.event] = [];
                    }
                    eventData[member.level][member.event].push({
                        name: member.name,
                        img: member.img, 
                        distance: parseFloat(member.distance.toFixed(1)),
                        practiceCount: member.practiceCount,
                        history: member.history.length > 0 ? member.history : [0]
                    });
                });

                safeRenderApp();

            } catch (error) {
                console.error("Failed to load Google Sheet data:", error);
                document.getElementById('main-content').innerHTML = `
                    <div class="text-center text-red-500 mt-10">
                        <i data-lucide="alert-triangle" class="w-12 h-12 mx-auto mb-2"></i>
                        <p class="font-bold">โหลดข้อมูลจากฟอร์มไม่สำเร็จ</p>
                    </div>`;
                if(window.lucide) lucide.createIcons();
            }
        }

        function toggleMenu() {
            isMenuOpen = !isMenuOpen;
            const overlay = document.getElementById('sidebar-overlay');
            const content = document.getElementById('sidebar-content');
            
            if (isMenuOpen) {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                overlay.classList.add('opacity-100');
                content.classList.remove('-translate-x-full');
                content.classList.add('translate-x-0');
            } else {
                overlay.classList.add('opacity-0', 'pointer-events-none');
                overlay.classList.remove('opacity-100');
                content.classList.add('-translate-x-full');
                content.classList.remove('translate-x-0');
            }
        }

        function navigate(tab) {
            activeTab = tab;
            toggleMenu();
            renderNav();
            safeRenderApp();
        }

        function setEvent(eventName) {
            selectedEvent = eventName;
            safeRenderApp();
        }

        function setLevel(level) {
            currentLevel = level;
            selectedEvent = ''; // รีเซ็ตรายการกีฬาให้เลือกอันแรกสุดของ ม. นั้นอัตโนมัติ
            safeRenderApp();
        }

        function renderNav() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = navItems.map(item => `
                <button
                    onclick="navigate('${item.id}')"
                    class="flex items-center gap-3 p-3 border-4 border-black font-bold text-lg text-left shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all ${activeTab === item.id ? 'bg-black text-yellow-400' : 'bg-white text-black hover:bg-yellow-200 hover:-translate-y-1'}"
                >
                    <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                    ${item.label}
                </button>
            `).join('');
        }

        // --- ส่วนประกอบ UI สลับ ม.ต้น / ม.ปลาย ---
        function renderLevelToggle() {
            return `
                <div class="flex gap-2 mb-6">
                    <button onclick="setLevel('ม.ต้น')" class="flex-1 py-3 border-4 border-black font-black uppercase tracking-widest transition-all ${currentLevel === 'ม.ต้น' ? 'bg-black text-yellow-400 shadow-[2px_2px_0px_0px_rgba(253,224,71,1)] translate-y-1 translate-x-1' : 'bg-white text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-100'}">ม.ต้น</button>
                    <button onclick="setLevel('ม.ปลาย')" class="flex-1 py-3 border-4 border-black font-black uppercase tracking-widest transition-all ${currentLevel === 'ม.ปลาย' ? 'bg-black text-yellow-400 shadow-[2px_2px_0px_0px_rgba(253,224,71,1)] translate-y-1 translate-x-1' : 'bg-white text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-100'}">ม.ปลาย</button>
                </div>
            `;
        }

        function safeRenderApp() {
            try {
                const mainContent = document.getElementById('main-content');
                let contentHtml = '';

                if (activeTab === 'home') contentHtml = renderHome();
                else if (activeTab === 'dashboard') contentHtml = renderDashboard();
                else if (activeTab === 'leaderboard') contentHtml = renderLeaderboard();
                else if (activeTab === 'events') contentHtml = renderEvents();
                else if (activeTab === 'profile') contentHtml = renderProfile();

                mainContent.innerHTML = contentHtml;
                
                if (window.lucide) {
                    lucide.createIcons();
                }
            } catch (err) {
                console.error("Render Error: ", err);
            }
        }

        // --- RENDER VIEWS ---
        function renderHome() {
            let leadersHtml = leaders.map((leader, idx) => `
                <div class="border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] p-4 ${idx === 0 ? 'bg-yellow-100' : 'bg-white'}">
                    <div class="flex gap-4 items-start">
                        <div class="w-24 h-28 shrink-0 border-4 border-black bg-yellow-300 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] overflow-hidden flex items-center justify-center">
                            <img src="${leader.img}" alt="${leader.name}" class="w-full h-full object-cover object-top" />
                        </div>
                        <div class="flex-1">
                            <h3 class="font-black text-xl mb-1 text-black">${leader.name} <span class="text-sm font-normal text-gray-600">(${leader.grade})</span></h3>
                            <p class="text-[11px] font-bold bg-black text-white px-2 py-1 inline-block mb-2">${leader.role}</p>
                            <p class="text-sm text-gray-700 font-medium mb-1">${leader.fullname}</p>
                            <div class="flex items-center gap-1 text-xs font-bold text-blue-600 mt-2">
                                <i data-lucide="${leader.contact.includes('IG') ? 'instagram' : 'facebook'}" class="w-3.5 h-3.5"></i>
                                ${leader.contact}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            // กรองนักกีฬาตาม Level (ม.ต้น / ม.ปลาย)
            const levelMembers = members.filter(m => m.level === currentLevel);

            let membersHtml = levelMembers.length === 0 
                ? `<div class="text-center py-6 text-gray-500 font-bold">ยังไม่มีข้อมูลนักกีฬาในระดับนี้</div>`
                : levelMembers.map(member => {
                    return `
                    <div class="flex flex-col p-3 border-4 border-black bg-white shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 border-2 border-black bg-gray-100 overflow-hidden shrink-0">
                                    <img src="${member.img}" alt="${member.name}" class="w-full h-full object-cover" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=fallback'"/>
                                </div>
                                <div>
                                    <p class="font-bold text-lg leading-tight">${member.name}</p>
                                    <p class="text-xs font-medium text-gray-500">${member.grade} • ${member.event}</p>
                                </div>
                            </div>
                            <div class="flex flex-col items-end gap-1">
                                <p class="text-sm font-black bg-yellow-300 px-2 py-1 border-2 border-black" style="font-family: 'Courier New', Courier, monospace">${member.distance} km</p>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');

            return `
                <div class="space-y-8 animate-in fade-in duration-300">
                    <section>
                        <div class="inline-block bg-black text-yellow-400 px-4 py-2 border-4 border-black mb-4 font-bold uppercase tracking-widest shadow-[4px_4px_0px_0px_rgba(255,255,255,1)]">
                            Admin
                        </div>
                        <div class="flex flex-col gap-6 mt-2">${leadersHtml}</div>
                    </section>
                    
                    <section>
                        <div class="inline-block bg-white text-black px-4 py-2 border-4 border-black mb-4 font-bold shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                            นักกีฬาดาวรุ่ง
                        </div>
                        ${renderLevelToggle()}
                        <div class="grid grid-cols-1 gap-4">${membersHtml}</div>
                    </section>
                </div>
            `;
        }

        function renderDashboard() {
            const currentEventsData = eventData[currentLevel] || {};
            
            // ถ้ารายการที่เลือกไม่มีอยู่ในระดับชั้นนี้ ให้สลับไปรายการแรกที่มี
            if (!selectedEvent || !currentEventsData[selectedEvent]) {
                selectedEvent = Object.keys(currentEventsData)[0] || '';
            }

            if (!selectedEvent) return renderLevelToggle() + `<div class="text-center py-10 font-bold text-gray-500">ยังไม่มีข้อมูลการวิ่งในระดับชั้นนี้</div>`;

            const cleanEventName = selectedEvent.replace(/\s+/g, '').toLowerCase();
            const isRelay = cleanEventName.includes('4*') || cleanEventName.includes('4x');
            const starterLimit = isRelay ? 4 : 2;
            
            const currentData = [...currentEventsData[selectedEvent]].sort((a, b) => b.distance - a.distance);

            let eventButtons = Object.keys(currentEventsData).map(event => `
                <button
                    onclick="setEvent('${event}')"
                    class="whitespace-nowrap px-4 py-2 border-4 border-black font-bold shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] transition-colors ${selectedEvent === event ? 'bg-black text-yellow-400' : 'bg-white text-black'}"
                >
                    ${event}
                </button>
            `).join('');

            let runnersHtml = currentData.map((runner, index) => {
                const isStarter = index < starterLimit;
                const data = runner.history;
                const min = Math.min(...data) - 0.5; 
                const max = Math.max(...data) + 0.5;
                const range = max - min || 1; 
                
                let points = data.map((val, i) => {
                    const x = data.length > 1 ? (i / (data.length - 1)) * 100 : 50;
                    const y = 40 - (((val - min) / range) * 40); 
                    return `${x},${y}`;
                }).join(' ');

                let circles = data.map((val, i) => {
                    const x = data.length > 1 ? (i / (data.length - 1)) * 100 : 50;
                    const y = 40 - (((val - min) / range) * 40);
                    return `<circle cx="${x}" cy="${y}" r="3" fill="#fff" stroke="${isStarter ? '#000' : '#666'}" stroke-width="2" />`;
                }).join('');

                return `
                <div class="border-4 ${isStarter ? 'border-yellow-500' : 'border-gray-400 opacity-90'} bg-white shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] overflow-hidden">
                    <div class="p-3 flex justify-between items-center border-b-2 border-black ${isStarter ? 'bg-yellow-100' : 'bg-gray-100'}">
                        <div class="flex items-center gap-3">
                            <span class="font-black w-6 text-center text-lg ${isStarter ? 'text-yellow-600' : 'text-gray-500'}">#${index + 1}</span>
                            <div>
                                <p class="font-bold text-lg">${runner.name}</p>
                                <p class="text-xs text-gray-600 font-medium">ระยะทางรวม: <span class="font-black text-black">${runner.distance} km</span></p>
                            </div>
                        </div>
                        <div class="text-right">
                            ${isStarter ? 
                                `<span class="text-[10px] bg-green-500 text-white px-2 py-1 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] font-bold uppercase tracking-wider border-2 border-black">ตัวจริง</span>` : 
                                `<span class="text-[10px] bg-gray-400 text-white px-2 py-1 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] font-bold uppercase tracking-wider border-2 border-black">สำรอง</span>`
                            }
                        </div>
                    </div>
                    <div class="p-3 bg-white flex items-center justify-between gap-4">
                        <div class="flex-1">
                            <p class="text-[10px] font-bold text-gray-500 mb-1">กราฟระยะทางรายวัน</p>
                            <div class="relative w-full h-12 border-l-2 border-b-2 border-gray-300 pt-1 pr-1">
                                <svg viewBox="-5 -5 110 50" class="w-full h-full overflow-visible" preserveAspectRatio="none">
                                    <polyline fill="none" stroke="${isStarter ? '#eab308' : '#9ca3af'}" stroke-width="3" points="${points}"></polyline>
                                    ${circles}
                                </svg>
                            </div>
                        </div>
                        <div class="text-right shrink-0">
                            <p class="text-[10px] text-gray-500 font-bold uppercase">เข้าซ้อม</p>
                            <p class="font-black text-xl">${runner.practiceCount} <span class="text-xs font-normal">วัน</span></p>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            return `
                <div class="space-y-6">
                    ${renderLevelToggle()}
                    <div>
                        <h2 class="font-black text-xl mb-3 flex items-center gap-2">
                            <i data-lucide="medal" class="w-6 h-6 text-yellow-600"></i> คัดตัวจากระยะทาง 
                        </h2>
                        <div class="flex overflow-x-auto gap-2 pb-2 hide-scrollbar">
                            ${eventButtons}
                        </div>
                    </div>
                    <div class="space-y-4">
                        ${runnersHtml}
                    </div>
                </div>
            `;
        }

        function renderLeaderboard() {
            const levelMembers = members.filter(m => m.level === currentLevel);
            const sortedMembers = [...levelMembers].sort((a, b) => b.distance - a.distance);
            
            let htmlList = sortedMembers.length === 0 
                ? `<div class="text-center py-10 font-bold">ยังไม่มีข้อมูลนักกีฬาในระดับชั้นนี้</div>` 
                : sortedMembers.map((member, index) => {
                let bgClass = "bg-white";
                let rankColor = "text-gray-500";
                if (index === 0) { bgClass = "bg-yellow-100 border-yellow-500"; rankColor = "text-yellow-600"; }
                else if (index === 1) { bgClass = "bg-gray-100 border-gray-400"; rankColor = "text-gray-500"; }
                else if (index === 2) { bgClass = "bg-orange-50 border-orange-400"; rankColor = "text-orange-600"; }

                return `
                <div class="flex items-center gap-4 p-3 border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] ${bgClass}">
                    <div class="w-8 h-8 flex items-center justify-center font-black text-xl ${rankColor}">
                        #${index + 1}
                    </div>
                    <div class="w-12 h-12 border-2 border-black bg-white overflow-hidden shrink-0">
                        <img src="${member.img}" alt="${member.name}" class="w-full h-full object-cover" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=fallback'"/>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-lg leading-tight">${member.name}</h3>
                        <span class="text-xs bg-gray-200 px-1 rounded text-gray-600">${member.grade}</span>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-xl text-black" style="font-family: 'Courier New', Courier, monospace">
                            ${member.distance}<span class="text-sm font-bold text-gray-600 ml-1">km</span>
                        </p>
                    </div>
                </div>
                `;
            }).join('');

            return `
                <div class="space-y-4">
                    ${renderLevelToggle()}
                    <div class="bg-black text-white p-4 border-4 border-black text-center shadow-[6px_6px_0px_0px_rgba(253,224,71,1)]">
                        <i data-lucide="trophy" class="w-10 h-10 mx-auto text-yellow-400 mb-2"></i>
                        <h2 class="font-black text-2xl uppercase tracking-widest">Leaderboard</h2>
                        <p class="text-sm text-yellow-200">อันดับนักวิ่งจอมอึด (ระยะทางรวม)</p>
                    </div>
                    <div class="flex flex-col gap-3 mt-6">
                        ${htmlList}
                    </div>
                </div>
            `;
        }

        function renderEvents() {
            const currentEventsData = eventData[currentLevel] || {};
            
            let eventsHtml = Object.keys(currentEventsData).length === 0
                ? `<div class="text-center py-10 font-bold">ยังไม่มีข้อมูลรายการแข่งขันในระดับชั้นนี้</div>`
                : Object.keys(currentEventsData).map(eventName => {
                const cleanEventName = eventName.replace(/\s+/g, '').toLowerCase();
                const isRelay = cleanEventName.includes('4*') || cleanEventName.includes('4x');
                const starterLimit = isRelay ? 4 : 2;
                const starters = [...currentEventsData[eventName]].sort((a, b) => b.distance - a.distance).slice(0, starterLimit);

                let runnersCards = starters.map((runner) => `
                    <div class="bg-white border-2 border-black p-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] flex flex-col items-center text-center">
                        <div class="w-12 h-12 border-2 border-black bg-gray-100 rounded-full mb-2 overflow-hidden flex items-center justify-center shrink-0">
                            <img src="${runner.img}" alt="${runner.name}" class="w-full h-full object-cover" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=fallback'">
                        </div>
                        <p class="font-bold">${runner.name}</p>
                        <p class="text-[10px] text-gray-500 font-mono">${runner.distance} km</p>
                    </div>
                `).join('');

                return `
                <div class="border-4 border-black bg-white shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] p-0 overflow-hidden mb-6">
                    <div class="bg-black text-white p-3 flex justify-between items-center">
                        <h3 class="font-bold text-lg">${eventName}</h3>
                        <span class="text-xs bg-yellow-400 text-black px-2 py-1 font-bold">โควต้า: ${starterLimit} คน</span>
                    </div>
                    <div class="p-4 grid grid-cols-2 gap-3 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px]">
                        ${runnersCards}
                    </div>
                </div>
                `;
            }).join('');

            return `
                <div class="space-y-6">
                    ${renderLevelToggle()}
                    <div class="bg-yellow-400 p-4 border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]">
                        <h2 class="font-black text-xl text-center uppercase tracking-wider">รายการแข่งขัน</h2>
                        <p class="text-center text-sm font-medium mt-1">รายชื่อเฉพาะ "ตัวจริง" ในแต่ละรายการ</p>
                    </div>
                    ${eventsHtml}
                </div>
            `;
        }

        function renderProfile() {
            if (currentUser) {
                let runsHtml = currentUser.runs.length > 0 ? currentUser.runs.map((run, idx) => `
                    <div class="flex items-center gap-3 p-3 border-b-2 border-gray-200">
                        <a href="${run.img}" target="_blank" class="w-10 h-10 border-2 border-black bg-gray-100 overflow-hidden shrink-0 hover:opacity-75 transition-opacity relative group flex justify-center items-center">
                            <i data-lucide="image" class="w-4 h-4 text-gray-400 absolute"></i>
                            <img src="${run.img}" class="w-full h-full object-cover relative z-10" onerror="this.style.display='none'">
                        </a>
                        <div class="flex-1">
                            <p class="font-bold text-sm">${run.date}</p>
                            <p class="text-xs text-gray-500">ระยะทาง: ${run.distance} km</p>
                        </div>
                        <div class="font-black text-gray-400">#${currentUser.runs.length - idx}</div>
                    </div>
                `).join('') : `<p class="text-center text-sm text-gray-500 py-4">ยังไม่มีประวัติการส่งวิ่ง</p>`;

                return `
                <div class="space-y-6 animate-in fade-in duration-300">
                    <div class="border-4 border-black bg-white shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] p-0 overflow-hidden">
                        <div class="bg-yellow-400 p-4 border-b-4 border-black text-center relative">
                            <h2 class="font-black text-xl uppercase tracking-wider">โปรไฟล์ของฉัน</h2>
                            <button onclick="handleLogout()" class="absolute right-4 top-4 text-black hover:text-red-600"><i data-lucide="log-out" class="w-6 h-6"></i></button>
                        </div>
                        <div class="p-6 flex flex-col items-center text-center">
                            <div class="w-24 h-24 border-4 border-black bg-gray-100 overflow-hidden mb-4 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                <img src="${currentUser.img}" class="w-full h-full object-cover" onerror="this.src='https://api.dicebear.com/7.x/pixel-art/svg?seed=fallback'">
                            </div>
                            <h3 class="text-2xl font-black">${currentUser.name}</h3>
                            <p class="text-gray-600 font-bold text-sm mb-4">${currentUser.fullname}</p>

                            <div class="w-full grid grid-cols-2 gap-3 mb-6 text-left">
                                <div class="border-2 border-black bg-gray-50 p-2">
                                    <p class="text-[10px] text-gray-500 font-bold uppercase">ชั้นเรียน</p>
                                    <p class="font-black">${currentUser.grade}</p>
                                </div>
                                <div class="border-2 border-black bg-gray-50 p-2">
                                    <p class="text-[10px] text-gray-500 font-bold uppercase">รายการแข่ง</p>
                                    <p class="font-black text-[11px] leading-tight mt-1">${currentUser.event}</p>
                                </div>
                                <div class="border-2 border-black bg-yellow-100 p-2">
                                    <p class="text-[10px] text-gray-500 font-bold uppercase">ระยะทางรวม</p>
                                    <p class="font-black text-lg">${currentUser.distance} km</p>
                                </div>
                                <div class="border-2 border-black bg-green-100 p-2">
                                    <p class="text-[10px] text-gray-500 font-bold uppercase">เข้าซ้อม</p>
                                    <p class="font-black text-lg">${currentUser.practiceCount} วัน</p>
                                </div>
                            </div>
                            
                            <a href="https://forms.gle/jiZr7uw33H4DZPte7" target="_blank" class="w-full block bg-black text-yellow-400 font-black py-3 border-4 border-black shadow-[4px_4px_0px_0px_rgba(253,224,71,1)] hover:translate-y-1 hover:translate-x-1 hover:shadow-none transition-all active:scale-95 text-center mb-6">
                                + ส่งวิ่ง (อัปเดตระยะ)
                            </a>

                            <div class="w-full border-t-4 border-black pt-4 text-left">
                                <h4 class="font-black text-lg mb-3 flex items-center gap-2"><i data-lucide="history" class="w-5 h-5"></i> ประวัติการวิ่งล่าสุด</h4>
                                <div class="border-2 border-black bg-white flex flex-col max-h-[300px] overflow-y-auto hide-scrollbar">
                                    ${runsHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }

            return `
                <div class="animate-in fade-in duration-300 mt-4">
                    <div class="border-4 border-black bg-white shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] p-6 max-w-sm mx-auto">
                        <div class="flex justify-center mb-4">
                            <i data-lucide="user-circle" class="w-16 h-16 text-yellow-500"></i>
                        </div>
                        <h2 class="text-2xl font-black text-center mb-6 uppercase tracking-wide">เข้าสู่ระบบ</h2>
                        
                        <div id="login-error" class="hidden bg-red-100 text-red-600 p-2 mb-4 border-2 border-red-500 font-bold text-sm text-center"></div>
                        
                        <div class="space-y-4 text-left">
                            <div>
                                <label class="block font-bold text-sm mb-1">ID (รหัสประจำตัว_ห้อง)</label>
                                <input type="text" id="login-id" placeholder="เช่น 25521_2/1" class="w-full border-2 border-black p-2 font-mono outline-none focus:bg-yellow-100 transition-colors">
                            </div>
                            <div>
                                <label class="block font-bold text-sm mb-1">Password (รหัสประจำตัว)</label>
                                <input type="password" id="login-pass" placeholder="เช่น 25521" class="w-full border-2 border-black p-2 font-mono outline-none focus:bg-yellow-100 transition-colors">
                            </div>
                            <button onclick="handleLogin()" class="w-full bg-black text-white font-black py-3 border-4 border-black shadow-[4px_4px_0px_0px_rgba(253,224,71,1)] hover:translate-y-1 hover:translate-x-1 hover:shadow-none transition-all active:scale-95 mt-2">
                                LOG IN
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function handleLogin() {
            const idInput = document.getElementById('login-id').value.trim();
            const passInput = document.getElementById('login-pass').value.trim();
            const errorDiv = document.getElementById('login-error');

            if (!idInput || !passInput) {
                errorDiv.innerText = "กรุณากรอกข้อมูลให้ครบถ้วน";
                errorDiv.classList.remove('hidden');
                return;
            }

            const foundUser = members.find(m => m.loginId === idInput && m.password === passInput);

            if (foundUser) {
                currentUser = foundUser;
                safeRenderApp(); 
            } else {
                errorDiv.innerText = "ID หรือ Password ไม่ถูกต้อง!";
                errorDiv.classList.remove('hidden');
            }
        }

        function handleLogout() {
            currentUser = null;
            safeRenderApp();
        }

        // --- ทำงานเมื่อโหลดสคริปต์เสร็จ ---
        renderNav();
        if (window.lucide) lucide.createIcons(); 
        
        loadAthletesData();

    </script>
</body>
</html>
